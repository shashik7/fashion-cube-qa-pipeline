# ============================================================================
# FC-001 | Fashion Cube QA Automation - GitHub Actions CI/CD Pipeline
# ============================================================================

name: FC-001 QA Automation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  API_BASE_URL: 'http://localhost:3000'
  BASE_URL: 'http://localhost:3000'
  TEST_USER_EMAIL: 'testuser@fashioncube.com'
  TEST_USER_PASSWORD: 'Test@12345'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: API Tests (MongoDB service + live backend)
  # ─────────────────────────────────────────────
  api-tests:
    name: "FC-001 ✅ API Tests (34 tests)"
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: server/ecommerce
        run: npm install

      - name: Start backend server
        working-directory: server/ecommerce
        run: |
          node bin/www &
          sleep 8
          curl -sf http://localhost:3000/products || echo "DB empty — seeding next"

      - name: Seed database
        working-directory: server/ecommerce
        run: node seed.js

      - name: Verify backend healthy
        run: |
          curl -sf http://localhost:3000/products \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ {len(d[\"products\"])} products ready')"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: qa-automation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        working-directory: qa-automation
        run: |
          pytest tests/api/ \
            -m api \
            -v \
            --html=reports/api_test_report.html \
            --self-contained-html \
            --tb=short \
            --junitxml=reports/api_test_results.xml

      - name: Upload API Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fc-001-api-test-reports
          path: |
            qa-automation/reports/api_test_report.html
            qa-automation/reports/api_test_results.xml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 2: UI Tests (Playwright headless)
  # ─────────────────────────────────────────────
  ui-tests:
    name: "FC-001 🖥️ UI Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & start backend
        working-directory: server/ecommerce
        run: |
          npm install
          node seed.js
          node bin/www &
          sleep 8

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: qa-automation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system deps
        run: |
          cd qa-automation
          playwright install --with-deps chromium

      - name: Run UI Tests
        working-directory: qa-automation
        run: |
          pytest tests/ui/ \
            -m ui \
            -v \
            --html=reports/ui_test_report.html \
            --self-contained-html \
            --tb=short \
            --junitxml=reports/ui_test_results.xml \
            || true
        env:
          HEADLESS: 'true'
          BROWSER: 'chromium'

      - name: Upload UI Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fc-001-ui-test-reports
          path: |
            qa-automation/reports/ui_test_report.html
            qa-automation/reports/ui_test_results.xml
            qa-automation/reports/*.png
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: Performance Tests (k6)
  # ─────────────────────────────────────────────
  performance-tests:
    name: "FC-001 ⚡ Performance Tests (k6)"
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & start backend
        working-directory: server/ecommerce
        run: |
          npm install
          node seed.js
          node bin/www &
          sleep 8

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Performance Tests
        working-directory: qa-automation
        run: |
          k6 run performance/ecommerce_load.js \
            --out json=reports/k6_results.json \
            --summary-export=reports/k6_summary.json \
            || true
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fc-001-performance-reports
          path: |
            qa-automation/reports/k6_results.json
            qa-automation/reports/k6_summary.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: Final Summary
  # ─────────────────────────────────────────────
  pipeline-summary:
    name: "FC-001 📊 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, performance-tests]
    if: always()

    steps:
      - name: Print Results Summary
        run: |
          echo "============================================="
          echo " FC-001 QA Pipeline — Test Results Summary  "
          echo "============================================="
          echo "  API Tests:         ${{ needs.api-tests.result }}"
          echo "  UI Tests:          ${{ needs.ui-tests.result }}"
          echo "  Performance Tests: ${{ needs.performance-tests.result }}"
          echo ""
          if [ "${{ needs.api-tests.result }}" == "failure" ]; then
            echo "❌ PIPELINE FAILED: API tests failed."
            exit 1
          else
            echo "✅ PIPELINE PASSED: Core API tests completed successfully."
          fi

