# FC-001 | Fashion Cube QA Automation - Pytest Configuration
[pytest]
testpaths = tests
markers =
    ui: UI automation tests (Playwright)
    api: API automation tests (requests)
    smoke: Smoke tests
    regression: Regression tests
    negative: Negative test cases
    edge: Edge case tests
    boundary: Boundary value tests
addopts = -v --tb=short --strict-markers
